<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Match Day Capture</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#111417",
                        "secondary-fixed": "#7df4ff",
                        "inverse-on-surface": "#2e3134",
                        "outline": "#b18780",
                        "tertiary-fixed": "#dee2ec",
                        "on-secondary-fixed": "#002022",
                        "primary-fixed-dim": "#ffb4a8",
                        "primary-container": "#ff5540",
                        "on-surface": "#e1e2e7",
                        "inverse-primary": "#c00100",
                        "on-primary-fixed-variant": "#930100",
                        "secondary": "#d3fbff",
                        "on-primary-fixed": "#410000",
                        "error": "#ffb4ab",
                        "tertiary-container": "#8c919a",
                        "on-secondary": "#00363a",
                        "error-container": "#93000a",
                        "surface-container": "#1d2023",
                        "secondary-container": "#00eefc",
                        "on-secondary-container": "#00686f",
                        "on-tertiary": "#2c3138",
                        "outline-variant": "#603e39",
                        "surface-tint": "#ffb4a8",
                        "on-tertiary-fixed-variant": "#42474f",
                        "on-background": "#e1e2e7",
                        "surface-container-highest": "#323538",
                        "tertiary": "#c2c7d0",
                        "on-primary": "#690100",
                        "on-surface-variant": "#ebbbb4",
                        "surface": "#111417",
                        "surface-dim": "#111417",
                        "on-tertiary-fixed": "#171c23",
                        "on-error-container": "#ffdad6",
                        "surface-container-high": "#272a2e",
                        "surface-container-low": "#191c1f",
                        "inverse-surface": "#e1e2e7",
                        "surface-bright": "#37393d",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#00dbe9",
                        "primary": "#ffb4a8",
                        "on-tertiary-container": "#252a31",
                        "tertiary-fixed-dim": "#c2c7d0",
                        "surface-variant": "#323538",
                        "surface-container-lowest": "#0b0e11",
                        "on-secondary-fixed-variant": "#004f54",
                        "on-primary-container": "#5c0000",
                        "primary-fixed": "#ffdad4"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "sm": "12px",
                        "md": "16px",
                        "xl": "32px",
                        "xs": "4px",
                        "gutter-mobile": "12px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Sora", "sans-serif"],
                        "body-lg": ["Plus Jakarta Sans", "sans-serif"],
                        "display-lg": ["Sora", "sans-serif"],
                        "label-md": ["Plus Jakarta Sans", "sans-serif"],
                        "body-md": ["Plus Jakarta Sans", "sans-serif"],
                        "headline-md": ["Sora", "sans-serif"],
                        "headline-lg": ["Sora", "sans-serif"],
                        "label-sm": ["Plus Jakarta Sans", "sans-serif"]

                    "fontSize": {

<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .recording-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden relative flex flex-col antialiased selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Camera Viewport Background (Simulated) -->
<div class="absolute inset-0 z-0 w-full h-full bg-surface-container-lowest">
<img alt="Live camera view" class="w-full h-full object-cover opacity-80" data-alt="A first-person viewpoint looking down from the stands onto a brightly lit professional soccer pitch at night. The stadium seats are blurred in the immediate foreground, focusing on the vivid green grass and bright white stadium floodlights. The lighting is high-contrast and dramatic, creating a tense, electric atmosphere consistent with a premium sports fan experience app. The overall color palette is dark navy and stadium green with bright white light accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBp67mGs7ImnLNJD0V0Ci05zU2cTmKt2NfS7-7udAD1i5tO3WjJ-mWTDNbsvMKXWCpoFUUw0F6_aLSiAbub-95mqjr8lzJJXsofsEprLtF3_zibHLYJJ8Z2yZrOk3rAXMF7-b672eJkEtXVtoFIPFXYJ_1FMR5n_Z4aO2q_QpDqbz_nRC-3VM6iPK7j6N5qIbHEdzOVFbGo9PuB2_Ud2xsmM4Pkq2bGp43XOQhxqMQxqBw2cws8XoDL30LfwlSfor33gxLLhszE190"/>
<!-- Vignette/Gradients to ensure UI readability -->
<div class="absolute inset-0 bg-gradient-to-b from-background/80 via-transparent to-background/90 z-10 pointer-events-none"></div>
</div>
<!-- Top Overlay Controls -->
<header class="relative z-20 w-full pt-12 px-margin-mobile flex flex-col gap-6">
<!-- Standard Camera Top Actions -->
<div class="flex justify-between items-center w-full">
<button class="w-10 h-10 rounded-full bg-surface-container/30 backdrop-blur-xl flex items-center justify-center text-on-surface border border-white/10 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl">close</span>
</button>
<div class="flex gap-3">
<button class="w-10 h-10 rounded-full bg-surface-container/30 backdrop-blur-xl flex items-center justify-center text-on-surface border border-white/10 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl">flash_off</span>
</button>
<button class="w-10 h-10 rounded-full bg-surface-container/30 backdrop-blur-xl flex items-center justify-center text-on-surface border border-white/10 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl">timer</span>
</button>
</div>
</div>
<!-- Location/Match Check-in Badge -->
<div class="flex justify-center w-full">
<div class="bg-surface-container-highest/60 backdrop-blur-20px border border-secondary-fixed/20 rounded-full px-4 py-2 flex items-center gap-2 shadow-[0_4px_20px_rgba(0,238,252,0.1)]">
<div class="relative flex items-center justify-center w-2 h-2">
<div class="absolute w-full h-full bg-secondary-fixed rounded-full animate-ping opacity-75"></div>
<div class="relative w-2 h-2 rounded-full bg-secondary-fixed"></div>
</div>
<span class="text-label-sm font-label-sm text-tertiary uppercase tracking-wider">Checked in</span>
<span class="text-label-md font-label-md text-on-surface">Derby Match</span>
</div>
</div>
<!-- Optional: Live Recording Indicator (Hidden by default, shown via JS if needed) -->
<div class="flex justify-center w-full mt-2">
<div class="bg-primary-container/20 border border-primary-container/50 backdrop-blur-md rounded-[4px] px-2 py-1 flex items-center gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse"></div>
<span class="text-label-sm font-label-sm text-primary-fixed font-bold tracking-widest uppercase">00:14</span>
</div>
</div>
</header>
<!-- Bottom Overlay Controls -->
<footer class="relative z-20 w-full pb-xl px-margin-mobile flex flex-col gap-6 mt-auto">
<!-- Mode Toggle -->
<div class="flex justify-center gap-6 text-label-md font-label-md w-full">
<button class="text-tertiary hover:text-on-surface transition-colors">PHOTO</button>
<button class="text-primary-fixed-dim font-bold border-b-2 border-primary-fixed-dim pb-1 shadow-[0_2px_10px_rgba(255,85,64,0.3)]">VIDEO</button>
</div>
<!-- Metadata Input Tags (Horizontal Scroll) -->
<div class="flex gap-2 overflow-x-auto no-scrollbar w-full py-1 snap-x">
<!-- Active Tag -->
<button class="snap-start shrink-0 px-4 py-2 rounded-full border border-secondary-container bg-secondary-container/10 text-secondary-fixed text-label-sm font-label-sm uppercase tracking-wider flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">sports_soccer</span>
                Goal
            </button>
<!-- Inactive Tags -->
<button class="snap-start shrink-0 px-4 py-2 rounded-full border border-white/10 text-tertiary bg-surface-container/40 backdrop-blur-md text-label-sm font-label-sm uppercase tracking-wider active:bg-surface-container-highest transition-colors">
                Celebration
            </button>
<button class="snap-start shrink-0 px-4 py-2 rounded-full border border-white/10 text-tertiary bg-surface-container/40 backdrop-blur-md text-label-sm font-label-sm uppercase tracking-wider active:bg-surface-container-highest transition-colors">
                Tension
            </button>
<button class="snap-start shrink-0 px-4 py-2 rounded-full border border-white/10 text-tertiary bg-surface-container/40 backdrop-blur-md text-label-sm font-label-sm uppercase tracking-wider active:bg-surface-container-highest transition-colors">
                Foul
            </button>
<button class="snap-start shrink-0 px-4 py-2 rounded-full border border-white/10 text-tertiary bg-surface-container/40 backdrop-blur-md text-label-sm font-label-sm uppercase tracking-wider active:bg-surface-container-highest transition-colors">
                Save
            </button>
</div>
<!-- Main Action Bar -->
<div class="flex justify-between items-center w-full mt-2">
<!-- Gallery Shortcut -->
<button class="w-12 h-12 rounded-full bg-surface-container/40 backdrop-blur-md border border-white/10 flex items-center justify-center text-on-surface overflow-hidden relative active:scale-95 transition-transform">
<!-- Mini preview image -->
<div class="absolute inset-0 bg-surface-container-highest opacity-50"></div>
<span class="material-symbols-outlined z-10 text-xl drop-shadow-md">photo_library</span>
</button>
<!-- Primary CTA: Capture Button Cluster -->
<div class="flex flex-col items-center gap-3">
<!-- The Snap Button -->
<button class="relative w-[76px] h-[76px] rounded-full border-[3px] border-white/40 flex items-center justify-center p-1 active:scale-95 transition-transform duration-150">
<!-- Outer glowing ring (recording state simulation) -->
<div class="absolute inset-[-6px] rounded-full border border-primary-container/30 recording-pulse pointer-events-none"></div>
<!-- Inner red button -->
<div class="w-full h-full rounded-full bg-primary-container shadow-[0_0_20px_rgba(255,85,64,0.6)] flex items-center justify-center transition-all duration-300">
<!-- Square shape to indicate 'Stop Video' since VIDEO is active -->
<div class="w-6 h-6 rounded-[4px] bg-white transition-all duration-300"></div>
</div>
</button>
<!-- Minting Fee Info -->
<div class="flex items-center gap-1 text-label-sm font-label-sm text-tertiary-fixed-dim bg-surface-container-lowest/60 px-3 py-1.5 rounded-full backdrop-blur-md border border-white/5 shadow-sm">
<span class="material-symbols-outlined text-[14px] text-secondary-fixed-dim">token</span>
<span>0.5 CHZ to Mint</span>
</div>
</div>
<!-- Flip Camera Shortcut -->
<button class="w-12 h-12 rounded-full bg-surface-container/40 backdrop-blur-md border border-white/10 flex items-center justify-center text-on-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl">cameraswitch</span>
</button>
</div>
</footer>
</body></html>
